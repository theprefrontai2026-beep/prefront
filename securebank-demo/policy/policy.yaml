# SecureBank — enforceable policy bundle (the rules the runtime evaluates).
# Hand-authored for the demo (the same shape the skill-builder/semantic-layer
# binder emits). Each rule gates one or more intents; conditions reference facts =
# precheck row columns ∪ request args ∪ caller.* ; effects are block / mask /
# approval_required. caller.* is only ever on the LEFT of a comparison (the
# runtime's expression evaluator can't parse a dotted name on the right).
policy_bundle:
  version: "1"
  domain: securebank
  datasource_id: securebank
  metrics: {}

  intents:
    view_accounts: {allowed_roles: [Account Holder, Bank Teller, Bank Manager]}
    view_account:  {allowed_roles: [Account Holder, Bank Teller, Bank Manager]}  # ownership enforced by view_account_owner_only
    view_user:     {allowed_roles: [Bank Teller, Bank Manager]}
    view_users:    {allowed_roles: [Bank Teller, Bank Manager]}
    initiate_transfer: {allowed_roles: [Account Holder, Bank Teller, Bank Manager]}
    decide_loan:   {allowed_roles: [Bank Manager]}

  rules:
    # B2 — an account holder may read ONLY their own account by id (OWN_DATA_ONLY).
    # Fires only for account holders whose id differs from the row's owner; staff
    # (Teller/Manager) skip the role guard and may inspect any account.
    - rule_key: view_account_owner_only
      rule_type: restriction
      intents: [view_account]
      conditions:
        - {field: caller.role, operator: "==", value: "Account Holder", value_kind: literal, value_refs: []}
        - {field: caller.user_id, operator: "!=", value: "user_id", value_kind: expression, value_refs: [user_id]}
      effect:
        decision: block
        message: "OWN_DATA_ONLY: account holders may only view their own accounts."
      source:
        document: "SecureBank BRD"
        section: "Stakeholders — Account Holder"
        text: "Account Holder — Bank customer; can view own accounts, apply for loans, accept/decline loan offers, and initiate transfers within daily limits."
        evidence: "can view own accounts"
      bindings:
        caller.role: {source: caller, attribute: role}
        caller.user_id: {source: caller, attribute: user_id}
        user_id: {source: column, column: accounts.user_id}

    # B4 — an account holder may not enumerate other customers (ROLE_NOT_PERMITTED).
    - rule_key: view_users_account_holder_block
      rule_type: restriction
      intents: [view_users]
      conditions:
        - {field: caller.role, operator: "==", value: "Account Holder", value_kind: literal, value_refs: []}
      effect:
        decision: block
        message: "ROLE_NOT_PERMITTED: account holders cannot list other customers."
      source:
        document: "SecureBank BRD"
        section: "FR-USER-1"
        text: "Bank Managers and Tellers shall be able to list, view, create, and update user records."
        evidence: "Bank Managers and Tellers shall be able to list, view"
      bindings:
        caller.role: {source: caller, attribute: role}

    # B3/B5 — ssn is a MANAGER_ONLY_FIELD: masked for everyone except a Bank Manager.
    - rule_key: ssn_manager_only
      rule_type: data_access
      intents: [view_user, view_users]
      conditions:
        - {field: caller.role, operator: "!=", value: "Bank Manager", value_kind: literal, value_refs: []}
      effect:
        decision: mask
        restricted_fields: [ssn]
        message: "MANAGER_ONLY_FIELD: ssn is visible to Bank Managers only."
      source:
        document: "SecureBank BRD"
        section: "FR-ACCT-3"
        text: "Sensitive field edits (interest rate, credit limit, SSN, credit score, annual income) shall follow a maker-checker workflow requiring Bank Manager approval before changes take effect."
        evidence: "requiring Bank Manager approval"
      bindings:
        caller.role: {source: caller, attribute: role}
        ssn: {source: column, column: users.ssn}

    # No money moves out of a suspended account.
    - rule_key: transfer_from_suspended_account
      rule_type: restriction
      intents: [initiate_transfer]
      conditions:
        - {field: status, operator: "==", value: "suspended", value_kind: literal, value_refs: []}
      effect:
        decision: block
        message: "Source account is suspended — transfers are not permitted."
      source:
        document: "SecureBank BRD"
        section: "FR-TXN-4"
        text: "All fund transfers shall be authorized by the system's Authorization Service before execution; the service evaluates the user's role, risk level, and transfer amount."
        evidence: "authorized by the system's Authorization Service before execution"
      bindings:
        status: {source: column, column: accounts.status}

    # A transfer may not exceed the source account's available balance.
    - rule_key: transfer_insufficient_funds
      rule_type: restriction
      intents: [initiate_transfer]
      conditions:
        - {field: amount, operator: ">", value: "balance", value_kind: expression, value_refs: [balance]}
      effect:
        decision: block
        message: "Insufficient funds: amount exceeds the account balance."
      source:
        document: "SecureBank BRD"
        section: "FR-TXN-4"
        text: "All fund transfers shall be authorized by the system's Authorization Service before execution; the service evaluates the user's role, risk level, and transfer amount."
        evidence: "the service evaluates the user's role, risk level, and transfer amount"
      bindings:
        amount: {source: request_param}
        balance: {source: column, column: accounts.balance}

    # B6 — transfers above $10,000 (and within the ceiling) need Bank Manager approval.
    - rule_key: transfer_requires_approval
      rule_type: approval_threshold
      intents: [initiate_transfer]
      conditions:
        - {field: amount, operator: ">", value: 10000, value_kind: literal, value_refs: []}
        - {field: amount, operator: "<=", value: 250000, value_kind: literal, value_refs: []}
      effect:
        decision: approval_required
        approver_role: "Bank Manager"
        message: "Transfers above $10,000 require Bank Manager approval."
      source:
        document: "SecureBank BRD"
        section: "FR-TXN-3"
        text: "Transfers exceeding $5,000 may only be initiated by a Bank Teller, and require Bank Manager approval before the funds are moved. The system shall not complete such a transfer without explicit Manager approval on record."
        evidence: "require Bank Manager approval before the funds are moved"
      bindings:
        amount: {source: request_param}

    # B7 — a hard ceiling no role may exceed.
    - rule_key: transfer_ceiling
      rule_type: restriction
      intents: [initiate_transfer]
      conditions:
        - {field: amount, operator: ">", value: 250000, value_kind: literal, value_refs: []}
      effect:
        decision: block
        message: "Transfer exceeds the $250,000 hard ceiling."
      source:
        document: "SecureBank BRD"
        section: "BO-6"
        text: "Enforce daily transfer limits per role to control financial risk and fraud exposure."
        evidence: "control financial risk and fraud exposure"
      bindings:
        amount: {source: request_param}

    # B8 — only a Bank Manager may decide a loan.
    - rule_key: loan_decision_manager_only
      rule_type: restriction
      intents: [decide_loan]
      conditions:
        - {field: caller.role, operator: "!=", value: "Bank Manager", value_kind: literal, value_refs: []}
      effect:
        decision: block
        message: "decide_loan is restricted to Bank Managers."
      source:
        document: "SecureBank BRD"
        section: "FR-LOAN-3"
        text: "Loan approval is subject to the following limits: Bank Tellers may approve loans up to and including $50,000; Bank Managers may approve loans of any amount. No other role may approve a loan."
        evidence: "No other role may approve a loan"
      bindings:
        caller.role: {source: caller, attribute: role}
