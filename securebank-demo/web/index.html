<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Prefront · SecureBank — Governed vs Ungoverned</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@500;600&family=IBM+Plex+Mono:wght@400;500;600&family=Libre+Franklin:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#f3f1ec; --card:#faf9f5; --field:#eae7e0; --line:#d8d2c6; --line-soft:#e3ddd1;
    --rule-ink:#1f1d18; --ink:#1f1d18; --ink-soft:#4a443a; --muted:#6f685c; --faint:#9a9183;
    --oxblood:#8c3a2e; --forest:#4f6a3f; --amber:#a8762a; --clay:#8f6443;
    --oxblood-tint:#f0e1dc; --forest-tint:#e7ece1; --amber-tint:#f0e8d6; --clay-tint:#efe6db;
    --serif:"Spectral",ui-serif,Georgia,serif; --mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
    --sans:"Libre Franklin",ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
  .app{max-width:1180px;margin:0 auto;padding:0 0 120px}
  .topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;padding:28px 40px 20px;border-bottom:2px solid var(--rule-ink)}
  .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--oxblood)}
  .brand{margin:4px 0 0;font-family:var(--serif);font-size:27px;font-weight:600;letter-spacing:-.01em}
  .rec{text-align:right;font-family:var(--mono);font-size:11px;color:var(--muted);line-height:1.7}
  .controls{display:flex;align-items:center;gap:18px;padding:18px 40px;border-bottom:1px solid var(--line)}
  button.run{font-family:var(--mono);font-size:13px;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;
    background:var(--rule-ink);color:var(--paper);border:none;border-radius:2px;padding:10px 20px}
  button.run:disabled{opacity:.5;cursor:default}
  .status{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .tally{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
  .pill{font-family:var(--mono);font-size:11px;letter-spacing:.03em;padding:4px 11px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
  .pill.block{color:var(--oxblood);background:var(--oxblood-tint);border-color:transparent}
  .pill.appr{color:var(--amber);background:var(--amber-tint);border-color:transparent}
  .pill.mask{color:var(--clay);background:var(--clay-tint);border-color:transparent}
  .pill.allow{color:var(--forest);background:var(--forest-tint);border-color:transparent}

  .scn{padding:22px 40px;border-bottom:1px solid var(--line)}
  .scn-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:4px}
  .scn-id{font-family:var(--mono);font-weight:600;color:var(--oxblood)}
  .scn-cap{font-family:var(--mono);font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:2px 9px}
  .scn-caller{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .scn-q{margin:2px 0 16px;font-family:var(--serif);font-size:18px;color:var(--ink)}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:820px){.cols{grid-template-columns:1fr}}
  .side{border:1px solid var(--line);border-radius:2px;background:var(--card);overflow:hidden}
  .side-head{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase}
  .side.bad .side-head{background:var(--oxblood-tint);color:var(--oxblood);border-bottom:1px solid var(--line-soft)}
  .side.good .side-head{background:var(--rule-ink);color:var(--paper)}
  .side-body{padding:12px 14px}
  .verdict{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.04em;padding:4px 10px;border-radius:2px;display:inline-block;margin-bottom:8px}
  .v-block{color:var(--oxblood);background:var(--oxblood-tint)}
  .v-appr{color:var(--amber);background:var(--amber-tint)}
  .v-mask{color:var(--clay);background:var(--clay-tint)}
  .v-allow{color:var(--forest);background:var(--forest-tint)}
  .v-leak{color:var(--oxblood);background:var(--oxblood-tint)}
  .reason{font-size:13px;color:var(--ink-soft);margin:4px 0}
  .reason .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-right:6px}
  table.rows{width:100%;border-collapse:collapse;margin-top:8px;font-family:var(--mono);font-size:11.5px}
  table.rows th{text-align:left;color:var(--muted);font-weight:500;border-bottom:1px solid var(--line);padding:3px 8px 3px 0;text-transform:none}
  table.rows td{padding:3px 8px 3px 0;border-bottom:1px solid var(--line-soft);color:var(--ink-soft);white-space:nowrap}
  td.sensitive{color:var(--oxblood);font-weight:600}
  td.masked{color:var(--forest);font-weight:600}
  .meta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:8px}
  .expected{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:14px}
  .err{color:var(--oxblood);font-family:var(--mono);font-size:12px}
  /* decision trace */
  details.tr{margin-top:12px;border-top:1px solid var(--line-soft);padding-top:10px}
  details.tr summary{cursor:pointer;font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--clay)}
  .tr-head{display:flex;align-items:center;gap:8px;margin:10px 0}
  .tr-kicker{font-family:var(--mono);font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .tr-id{font-family:var(--mono);font-size:10px;color:var(--faint)}
  .tr-stages{list-style:none;margin:0;padding:0}
  .tr-stage{position:relative;display:flex;gap:10px;padding:0 0 14px}
  .tr-stage:last-child{padding-bottom:0}
  .tr-stage::before{content:"";position:absolute;left:9px;top:20px;bottom:0;width:1px;background:var(--line)}
  .tr-stage:last-child::before{display:none}
  .tr-marker{display:inline-grid;place-items:center;flex-shrink:0;width:19px;height:19px;border-radius:50%;z-index:1;background:var(--clay-tint);color:var(--clay);font-family:var(--mono);font-size:10px;font-weight:600}
  .tr-body{flex:1;min-width:0}
  .tr-title{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:3px}
  .tr-detail{font-size:12px;color:var(--ink-soft)}
  .tr-muted{font-size:12px;color:var(--muted);font-style:italic}
  .tr-sub{font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:2px}
  .tr-call{font-family:var(--mono);font-size:11.5px;color:var(--ink)}
  .tr-kv{display:flex;flex-wrap:wrap;gap:5px}
  .tr-pair{display:inline-flex;align-items:baseline;gap:5px;border:1px solid var(--line);border-radius:5px;padding:2px 7px;font-family:var(--mono);font-size:11px}
  .tr-pair .k{color:var(--muted)} .tr-pair .v{color:var(--ink);font-weight:600}
  .tr-rule{display:flex;align-items:center;flex-wrap:wrap;gap:7px;padding:3px 0;opacity:.55;font-family:var(--mono);font-size:11.5px}
  .tr-rule.is-fired{opacity:1}
  .tr-effect{font-family:var(--mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:1px 7px}
  .tr-chip{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;border-radius:999px;padding:2px 8px}
  .tr-chip.fired{color:var(--forest);background:var(--forest-tint)}
  .tr-chip.skip{color:var(--muted);background:var(--field)}
  .tr-chip.ind{color:var(--amber);background:var(--amber-tint)}
  .tr-missing{font-family:var(--mono);font-size:10px;color:var(--amber)}
  .tr-exec{font-family:var(--mono);font-size:12px;font-weight:600}
  .tr-exec.ok{color:var(--forest)} .tr-exec.dry{color:var(--clay)} .tr-exec.off{color:var(--muted)}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div>
      <div class="kicker">Governance Dossier · Runtime</div>
      <h1 class="brand">Prefront · SecureBank — Governed vs App Layer</h1>
    </div>
    <div class="rec"><div id="recdate"></div><div>SECUREBANK · 12 SCENARIOS</div></div>
  </header>
  <div class="controls">
    <button class="run" id="run">Run scenarios</button>
    <span class="status" id="status">Click “Run scenarios” to evaluate each request with and without Prefront.</span>
    <div class="tally" id="tally"></div>
  </div>
  <main id="out"></main>
</div>

<script>
const SENSITIVE = new Set(["ssn","balance","tax_id"]);
document.getElementById("recdate").textContent = "REC. " + new Date().toISOString().slice(0,10);

function rowsTable(cols, rows, {masked=[]}={}) {
  if (!rows || !rows.length) return "";
  cols = cols || Object.keys(rows[0]);
  const maskedSet = new Set(masked);
  const head = cols.map(c => `<th>${c}</th>`).join("");
  const body = rows.slice(0,5).map(r => "<tr>" + cols.map(c => {
    let v = r[c]; v = (v===null||v===undefined) ? "" : String(v);
    let cls = "";
    if (maskedSet.has(c) && v === "***") cls = "masked";
    else if (SENSITIVE.has(c)) cls = "sensitive";
    return `<td class="${cls}">${v}</td>`;
  }).join("") + "</tr>").join("");
  const more = rows.length>5 ? `<div class="meta">… ${rows.length-5} more</div>` : "";
  return `<table class="rows"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>${more}`;
}

function ungovernedSide(u) {
  let v = `<span class="verdict v-leak">NO POLICY</span>`;
  let body = "";
  if (u.tool) {
    const argStr = u.args && Object.keys(u.args).length
      ? Object.entries(u.args).map(([k,w]) => `${k}=${w}`).join(", ")
      : "";
    body += `<div class="reason"><span class="lbl">called</span><code>${u.tool}(${argStr})</code></div>`;
  }
  if (u.sql) body += `<pre style="font-size:11px;margin:4px 0;white-space:pre-wrap;word-break:break-all">${u.sql}</pre>`;
  if (u.error) body += `<div class="err">ERROR ${u.error}</div>`;
  else if (u.rows && u.rows.length) {
    body += `<div class="reason"><span class="lbl">returned</span>${u.row_count} row(s)</div>`;
    body += rowsTable(u.columns, u.rows);
  }
  if (u.answer) body += `<div class="reason"><span class="lbl">model</span>${u.answer}</div>`;
  return `<div class="side bad"><div class="side-head"><span>App layer · no policy</span></div><div class="side-body">${v}${body}</div></div>`;
}

function governedSide(g) {
  const o = (g.outcome||"").toUpperCase();
  let cls = "v-allow";
  if (o.startsWith("BLOCK")) cls = "v-block";
  else if (o.startsWith("APPROVAL")) cls = "v-appr";
  else if (o.includes("MASK")) cls = "v-mask";
  let body = `<span class="verdict ${cls}">${g.outcome||g.status||"—"}</span>`;
  for (const r of (g.reasons||[])) body += `<div class="reason"><span class="lbl">reason</span>${r}</div>`;
  if (g.approver_roles && g.approver_roles.length) body += `<div class="reason"><span class="lbl">approver</span>${g.approver_roles.join(", ")}</div>`;
  if (g.masked_fields && g.masked_fields.length) body += `<div class="reason"><span class="lbl">masked</span>${g.masked_fields.join(", ")}</div>`;
  if (g.status==="allowed" && g.rows && g.rows.length) body += rowsTable(Object.keys(g.rows[0]), g.rows, {masked:g.masked_fields||[]});
  else if (g.status==="allowed" && g.row_count===0) body += `<div class="reason">0 rows — nothing in the caller's scope</div>`;
  if (g.governance) body += decisionTrace(g.governance);
  return `<div class="side good"><div class="side-head"><span>With Prefront</span></div><div class="side-body">${body}</div></div>`;
}

// The deterministic decision trace — what was asked, by whom, which rules fired,
// what was decided, what executed. Mirrors the React DecisionTrace component.
function decisionTrace(t) {
  const decVerdict = t.decision==="blocked" ? "v-block"
    : t.decision==="approval_required" ? "v-appr"
    : (t.masked_fields||[]).length ? "v-mask" : "v-allow";
  const decLabel = t.decision==="blocked" ? "BLOCK"
    : t.decision==="approval_required" ? "APPROVAL REQUIRED"
    : (t.masked_fields||[]).length ? "ALLOW · MASKED" : "ALLOW";
  const execLabel = {executed:"SQL executed", write_executed:"write executed",
    write_dry_run:"write simulated (dry-run)", not_executed:"not executed",
    error:"execution error"}[t.execution_status] || t.execution_status || "—";
  const rules = t.rules_evaluated || [];
  const authzBlock = t.decision==="blocked" && !rules.length;

  const stage = (n, title, detail) =>
    `<li class="tr-stage"><span class="tr-marker">${n}</span><div class="tr-body">`
    + `<div class="tr-title">${title}</div><div class="tr-detail">${detail}</div></div></li>`;

  // 1 Identity
  const ident = t.caller
    ? `<div class="tr-kv">${Object.entries(t.caller).map(([k,v]) =>
        `<span class="tr-pair"><span class="k">${k}</span><span class="v">${v}</span></span>`).join("")}</div>`
    : `<span class="tr-muted">no caller identity — everything blocks</span>`;
  // 2 Request
  const args = Object.entries(t.parameters||{}).map(([k,v]) => `${k}=${JSON.stringify(v)}`).join(", ");
  const req = `<code class="tr-call">${t.matched_intent}(${args})</code>`
    + (t.template_id ? `<div class="tr-sub">template ${t.template_id}</div>` : "");
  // 3 Policy evaluation
  let policy;
  if (rules.length) {
    policy = rules.map(r => {
      const ind = r.missing && r.missing.length;
      const chip = ind ? "indeterminate" : r.fired ? "fired" : "not fired";
      const chipCls = ind ? "ind" : r.fired ? "fired" : "skip";
      return `<div class="tr-rule${r.fired?" is-fired":""}"><code>${r.rule_key}</code>`
        + (r.decision ? `<span class="tr-effect">${r.decision}</span>` : "")
        + `<span class="tr-chip ${chipCls}">${chip}</span>`
        + (ind ? `<span class="tr-missing">missing: ${r.missing.join(", ")}</span>` : "")
        + `</div>`;
    }).join("");
  } else {
    policy = `<span class="tr-muted">${authzBlock
      ? "blocked at authorization — no business rules evaluated"
      : "no rules applied to this intent"}</span>`;
  }
  // 4 Decision
  let dec = `<span class="verdict ${decVerdict}">${decLabel}</span>`;
  for (const r of (t.reasons||[])) dec += `<div class="reason"><span class="lbl">reason</span>${r}</div>`;
  if ((t.approver_roles||[]).length) dec += `<div class="reason"><span class="lbl">approver</span>${t.approver_roles.join(", ")}</div>`;
  if ((t.masked_fields||[]).length) dec += `<div class="reason"><span class="lbl">masked</span>${t.masked_fields.join(", ")}</div>`;
  // 5 Execution
  const execCls = (t.execution_status==="executed"||t.execution_status==="write_executed") ? "ok"
    : t.execution_status==="write_dry_run" ? "dry" : "off";
  const exec = `<span class="tr-exec ${execCls}">${execLabel}</span>`;

  return `<details class="tr"><summary>Show decision trace</summary>`
    + `<div class="tr-head"><span class="tr-kicker">Decision trace</span>`
    + (t.trace_id ? `<code class="tr-id">${t.trace_id}</code>` : "") + `</div>`
    + `<ol class="tr-stages">`
    + stage(1, "Identity", ident)
    + stage(2, "Request", req)
    + stage(3, "Policy evaluation", policy)
    + stage(4, "Decision", dec)
    + stage(5, "Execution", exec)
    + `</ol></details>`;
}

function card(s) {
  return `<section class="scn">
    <div class="scn-head">
      <span class="scn-id">${s.id}</span>
      <span class="scn-cap">${s.capability}</span>
      <span class="scn-caller">${s.caller} · ${s.role}</span>
    </div>
    <div class="scn-q">${s.question}</div>
    <div class="cols">${ungovernedSide(s.ungoverned)}${governedSide(s.governed)}</div>
    <div class="expected">expected: ${s.expected}</div>
  </section>`;
}

function tally(data) {
  const t = {block:0,appr:0,mask:0,allow:0};
  for (const s of data) {
    const o = (s.governed.outcome||"").toUpperCase();
    if (o.startsWith("BLOCK")) t.block++;
    else if (o.startsWith("APPROVAL")) t.appr++;
    else if (o.includes("MASK")) t.mask++;
    else t.allow++;
  }
  return `<span class="pill block">${t.block} blocked</span>
          <span class="pill appr">${t.appr} approval</span>
          <span class="pill mask">${t.mask} masked</span>
          <span class="pill allow">${t.allow} allowed</span>`;
}

async function run() {
  const btn = document.getElementById("run"), st = document.getElementById("status");
  btn.disabled = true; st.textContent = "Running 12 scenarios with and without Prefront…";
  document.getElementById("out").innerHTML = "";
  try {
    const res = await fetch("/api/diff");
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    document.getElementById("out").innerHTML = data.map(card).join("");
    document.getElementById("tally").innerHTML = tally(data);
    st.textContent = `${data.length} scenarios — same request, evaluated both ways.`;
  } catch (e) {
    st.innerHTML = `<span class="err">⚠ ${e.message}</span>`;
  } finally {
    btn.disabled = false;
  }
}
document.getElementById("run").addEventListener("click", run);
run();
</script>
</body>
</html>
