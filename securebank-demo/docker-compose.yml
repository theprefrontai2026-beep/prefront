# Prefront SecureBank — sample datasource
# Spin up:  docker compose up -d
# Connect:  docker compose exec db psql -U securebank -d securebank
# Reset:    docker compose down -v && docker compose up -d
#
# schema.sql + seed.sql in ./db auto-apply (alphabetical via 01_/02_ mount) on
# first boot, against an empty data volume. Host port 5434 to avoid clashing
# with the commercerisk-demo Postgres (5433).
services:
  db:
    image: postgres:16
    container_name: securebank-db
    environment:
      POSTGRES_USER: securebank
      POSTGRES_PASSWORD: securebank
      POSTGRES_DB: securebank
    ports:
      - "5434:5432"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
      - securebank_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securebank -d securebank"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---- the "before": a real LLM (OpenAI gpt-4o-mini) that writes + runs raw SQL ----
  ungoverned:
    build: .
    container_name: securebank-ungoverned
    command: ["python", "ungoverned_server.py"]
    env_file: ../prefront/.env          # supplies OPENAI_API_KEY (same key Prefront uses)
    environment:
      SECUREBANK_DSN: postgresql://securebank:securebank@db:5432/securebank
      UNGOVERNED_MODEL: gpt-4o-mini
      SECUREBANK_READONLY: "on"          # writes are attempted but rolled back, never persisted
    ports: ["8096:8096"]
    depends_on:
      db: {condition: service_healthy}

  # ---- seed the curated SecureBank artifacts the MCP serves ----
  # Copies the hand-authored SecureBank templates + policy into a DEDICATED demo dir
  # /artifacts/securebank-demo/ (the governed view_accounts/view_user/initiate_transfer/
  # decide_loan tools + ownership/mask/approval rules — caller user_id is associated
  # per-request by IDENTITY_QUERY, no per-call config). This dir is OWNED by the demo:
  # the UI's Data Connector / Policy Studio publish to /artifacts/<your id>/ (e.g.
  # securebank), never here, so exploring the live flow can't clobber the demo.
  # Idempotent: seeds on a fresh volume, doesn't clobber an existing one.
  seed-artifacts:
    image: alpine
    container_name: securebank-seed
    command:
      - sh
      - -c
      - mkdir -p /artifacts/securebank-demo &&
        ([ -f /artifacts/securebank-demo/query_templates.yaml ] ||
         cp /src/query_templates.yaml /src/policy.yaml /artifacts/securebank-demo/) &&
        echo "securebank curated artifacts ready in /artifacts/securebank-demo"
    volumes:
      - prefront_artifacts:/artifacts
      - ./policy:/src:ro
    restart: "no"

  # ---- Prefront, exposed as ONE MCP server (the single endpoint the LLM uses) ----
  # Serves the demo's DEDICATED artifacts (/artifacts/securebank-demo/) from the shared
  # volume — separate from the generic /artifacts/<id>/ namespace the UI publishes to,
  # so UI exploration never overwrites the demo. The caller identity is NOT baked in —
  # each client connection presents it (X-Prefront-Act-As), resolved via IDENTITY_QUERY.
  mcp:
    image: prefront-semantic-mcp-server
    container_name: securebank-mcp
    command: ["--templates=/artifacts/securebank-demo/query_templates.yaml", "serve", "--http", "--host=0.0.0.0", "--port=8090"]
    environment:
      IDENTITY_QUERY: SELECT user_id, name, email, role FROM users WHERE email = :who
      DATABASE_URL: postgresql://securebank:securebank@db:5432/securebank
      POLICY_PATH: /artifacts/securebank-demo/policy.yaml
    volumes: ["prefront_artifacts:/artifacts:ro"]   # shared with the engine; read-only here
    ports: ["8100:8090"]            # host 8100 (prefront's own MCP already owns 8090)
    depends_on:
      db: {condition: service_healthy}
      seed-artifacts: {condition: service_completed_successfully}

  # ---- the "after" orchestrator: gpt-4o-mini as an MCP CLIENT of the one server ----
  demo:
    build: .
    container_name: securebank-demo
    command: ["python", "demo_server.py"]
    env_file: ../prefront/.env          # OPENAI_API_KEY
    environment:
      GOVERNED_MODEL: gpt-4o-mini
      UNGOVERNED_URL: http://ungoverned:8096/run
      GOVERNED_MCP_URL: http://mcp:8090/sse     # the single Prefront endpoint
    ports: ["8095:8095"]
    depends_on:
      ungoverned: {condition: service_started}
      mcp: {condition: service_started}

volumes:
  securebank_pgdata:
  # The engine's shared artifacts volume (created by the prefront stack). The
  # semantic-layer-api writes /artifacts/<datasource_id>/ here; this MCP server reads it.
  prefront_artifacts:
    external: true
