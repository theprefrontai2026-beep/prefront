# A customer-authored dbt semantic model over the CommerceRisk schema.
# Pure analytics modeling — structure only. Joins are IMPLICIT: a `foreign`
# entity matches another model's `primary` entity of the same name.
semantic_models:
  - name: regions
    model: ref('regions')
    entities:
      - name: region
        type: primary
        expr: region_id
    dimensions:
      - name: name
        type: categorical

  - name: sales_reps
    model: ref('sales_reps')
    entities:
      - name: sales_rep
        type: primary
        expr: rep_id
      - name: region
        type: foreign
        expr: region_id
    dimensions:
      - name: name
        type: categorical
      - name: email
        type: categorical
      - name: role
        type: categorical

  - name: customers
    model: ref('customers')
    entities:
      - name: customer
        type: primary
        expr: customer_id
      - name: region
        type: foreign
        expr: region_id
      - name: sales_rep
        type: foreign
        expr: assigned_rep_id
      # Deliberately NOT backed by a real foreign key (customers.industry is not
      # an FK to products) — exercises the FK-discipline drop + report path.
      - name: product
        type: foreign
        expr: industry
    dimensions:
      - name: name
        type: categorical
      - name: industry
        type: categorical
      - name: credit_status
        type: categorical
      - name: risk_rating
        type: categorical
      - name: tax_id
        type: categorical
      - name: created_at
        type: time
        type_params:
          time_granularity: day
    measures:
      - name: credit_limit
        agg: sum
        expr: credit_limit
      - name: current_balance
        agg: sum
        expr: current_balance
      # An aggregate measure with no stored column — routed to metrics + reported.
      - name: total_exposure
        agg: sum
        expr: credit_limit + current_balance

  - name: products
    model: ref('products')
    entities:
      - name: product
        type: primary
        expr: product_id
    dimensions:
      - name: name
        type: categorical
      - name: category
        type: categorical
    measures:
      - name: unit_price
        agg: average
        expr: unit_price
      - name: unit_cost
        agg: average
        expr: unit_cost

  - name: orders
    model: ref('orders')
    entities:
      - name: order
        type: primary
        expr: order_id
      - name: customer
        type: foreign
        expr: customer_id
      - name: sales_rep
        type: foreign
        expr: rep_id
    dimensions:
      - name: status
        type: categorical
      - name: approval_status
        type: categorical
      - name: order_date
        type: time
    measures:
      - name: order_total
        agg: sum
        expr: order_total
      - name: discount_pct
        agg: average
        expr: discount_pct
