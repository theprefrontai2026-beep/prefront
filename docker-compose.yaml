# Prefront — full design-time + runtime stack.
#
#   skill-builder        docs -> rules        (FastAPI)         :8000
#   semantic-layer-api   schema introspection / build (design-time API) :8010
#   semantic-mcp-server  templates -> live MCP query tools (HTTP/SSE) :8090
#   api-server           UI companion: audit log + review websocket (Express) :8080
#   ui                   Prefront front-end (React/Vite -> nginx) :5173
#
# The bundled example datasource is SecureBank (see ./securebank-demo), wired in
# below; the engine itself is domain-independent.
#
# The ui (nginx) reverse-proxies /design -> skill-builder, /design/semantic ->
# semantic-layer-api, and /api (+ /api/ws) -> api-server, so the SPA stays
# same-origin (no CORS).
#
# Quick start:
#   cp .env.example .env   # put your LLM key in it (GROQ_API_KEY=...)
#   docker compose up --build
#
# The LLM key is needed by skill-builder (extract-rules) and semantic-layer (mapper).

name: prefront

# Shared LLM credentials/provider, injected into the services that call an LLM.
x-llm-env: &llm-env
  LLM_PROVIDER: ${LLM_PROVIDER:-openai}
  SKILLBUILDER_PROVIDER: ${LLM_PROVIDER:-openai}
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}

services:
  # ---- skill builder's own design-time database ----------------------------
  # Dedicated Postgres for design-time state (documents, clauses, candidate
  # rules, atoms, unresolved items). Separate from the tenant's runtime
  # datasource by design.
  skill-builder-db:
    image: postgres:16
    environment:
      POSTGRES_USER: skillbuilder
      POSTGRES_PASSWORD: skillbuilder
      POSTGRES_DB: skillbuilder
    volumes:
      - skillbuilder_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillbuilder"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- api-server's own database (audit log) -------------------------------
  # Dedicated Postgres so the api-server's drizzle-kit push owns the whole
  # schema (it only manages rule_audit_log) and never touches skill-builder's
  # tables. Kept separate from skill-builder-db by design.
  api-db:
    image: postgres:16
    environment:
      POSTGRES_USER: prefront
      POSTGRES_PASSWORD: prefront
      POSTGRES_DB: prefront_audit
    volumes:
      - api_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefront -d prefront_audit"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- service 1: skill builder (docs -> rules) ----------------------------
  skill-builder:
    build: ./skill-builder
    environment:
      <<: *llm-env
      # SQLAlchemy DSN for the design-time Postgres above (psycopg3 driver).
      SKILLBUILDER_DB: postgresql+psycopg://skillbuilder:skillbuilder@skill-builder-db:5432/skillbuilder
      SKILLBUILDER_REGISTRY: /data/skills
      # Always run in debug: stage + per-clause LLM trace to the container logs.
      # Override per-run with `SKILLBUILDER_LOG_LEVEL=INFO docker compose up`.
      SKILLBUILDER_LOG_LEVEL: ${SKILLBUILDER_LOG_LEVEL:-DEBUG}
      # Named (curated) domain packs overlay the DDL-derived schema pack: they
      # supply roles/intents/aliases the schema can't. Set to 0 to ground from
      # the DDL only.
      SKILLBUILDER_NAMED_PACKS: ${SKILLBUILDER_NAMED_PACKS:-1}
    volumes:
      # Bind-mount the artifact registry to the host so generated skill files
      # (skills/<id>/v<ver>/extracted_rules.yaml, per-run artifacts, …) are
      # browsable directly on disk instead of living in a Docker named volume.
      - ./skill-builder-data:/data
    ports: ["8000:8000"]
    depends_on:
      skill-builder-db:
        condition: service_healthy

  # ---- semantic-layer design-time API (Data Connector: schema introspection)
  # Same image as the build job, but long-running: parses uploaded DDL and
  # introspects live databases for the UI's Data Connector tab.
  semantic-layer-api:
    build: ./semantic-layer
    command: ["api", "--host", "0.0.0.0", "--port", "8010"]
    environment:
      <<: *llm-env       # the /build endpoint runs the LLM semantic mapper
      SEMANTICLAYER_DB: /data/semanticlayer.db   # persisted templates + approvals
      # Legacy single-publish-path default; per-datasource publishing writes to
      # /artifacts/<datasource_id>/ under this path's grandparent (/artifacts).
      SEMANTICLAYER_PUBLISH_PATH: /artifacts/example/query_templates.yaml
      SEMANTICLAYER_POLICY_PUBLISH_PATH: /artifacts/example/policy.yaml
    volumes:
      - semanticlayer_data:/data
      - artifacts:/artifacts          # publish writes the approved templates here
    ports: ["8010:8010"]
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach a Postgres on the host

  # ---- service 3: semantic MCP server (templates -> live query tools) ------
  # The engine runtime, serving the bundled SecureBank example artifacts.
  semantic-mcp-server:
    build: ./semantic-mcp-server
    command:
      - --templates=/artifacts/securebank-demo/query_templates.yaml
      - serve
      - --http
      - --host=0.0.0.0
      - --port=8090
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://securebank:securebank@securebank-db:5432/securebank}
      # Governance: enforce the published policy bundle. IDENTITY_QUERY is the
      # DEPLOYMENT's mapping of an identity to caller attributes — it aliases the
      # app schema onto the contract names; Prefront itself assumes no identity
      # table. Identity is resolved per-connection (X-Prefront-Act-As header).
      POLICY_PATH: /artifacts/securebank-demo/policy.yaml
      IDENTITY_QUERY: SELECT user_id, name, email, role FROM users WHERE email = :who
      ENABLE_WRITES: ${ENABLE_WRITES:-0}
      TRACE_PATH: /data/traces.jsonl
    volumes:
      - artifacts:/artifacts:ro
      - mcp_data:/data                # decision traces
    ports: ["8090:8090"]
    depends_on:
      securebank-db:
        condition: service_healthy
      securebank-seed:
        condition: service_completed_successfully

  # ---- api server (new UI companion: audit log + review websocket) ---------
  # Node/Express service backing the new UI's persistent audit log
  # (/api/audit) and collaborative-review presence websocket (/api/ws/review).
  # Reuses the skill-builder design-time Postgres for its rule_audit_log table;
  # drizzle-kit push (idempotent) creates the table on start.
  api-server:
    build:
      context: ./prefront-ui
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql://prefront:prefront@api-db:5432/prefront_audit
      PORT: "8080"
      NODE_ENV: production
    ports: ["8080:8080"]
    depends_on:
      api-db:
        condition: service_healthy

  # ---- PII analyzer (Presidio): guesses which schema fields are PII ---------
  # Design-time only, name-based — the Data Graph's "Detect PII" calls it.
  pii-analyzer:
    build: ./pii-analyzer
    ports: ["8020:8020"]

  # ---- service 4: UI (new workflow-v1 front-end, nginx) --------------------
  ui:
    build:
      context: ./prefront-ui
      dockerfile: Dockerfile.ui
    ports: ["5173:80"]
    depends_on:
      - skill-builder
      - semantic-layer-api
      - api-server
      - pii-analyzer

  # ==========================================================================
  # SecureBank demo (moved in-repo under ./securebank-demo) — the active
  # before/after harness. Its own Postgres + an app-layer agent service
  # (typed business functions, no access-control policy — the realistic "before")
  # + ONE Prefront MCP server (curated artifacts) + the orchestrator the UI's
  # Runtime tab points at (http://localhost:8095). Shares the engine's
  # `artifacts` volume; the demo owns /artifacts/securebank-demo/ so UI
  # publishing to /artifacts/<id>/ never clobbers it.
  # ==========================================================================

  # ---- SecureBank sample datasource (schema + seed auto-apply on first boot)
  securebank-db:
    image: postgres:16
    environment:
      POSTGRES_USER: securebank
      POSTGRES_PASSWORD: securebank
      POSTGRES_DB: securebank
    volumes:
      - ./securebank-demo/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./securebank-demo/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
      - securebank_pgdata:/var/lib/postgresql/data
    ports: ["5434:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securebank -d securebank"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---- the "before": app-layer agent — typed functions, no access-control policy ----
  securebank-ungoverned:
    build: ./securebank-demo
    command: ["python", "ungoverned_server.py"]
    environment:
      <<: *llm-env                       # OPENAI_API_KEY (same key Prefront uses)
      SECUREBANK_DSN: postgresql://securebank:securebank@securebank-db:5432/securebank
      UNGOVERNED_MODEL: gpt-4o-mini
      SECUREBANK_READONLY: "on"          # writes attempted but rolled back
    ports: ["8096:8096"]
    depends_on:
      securebank-db: {condition: service_healthy}

  # ---- seed the curated SecureBank artifacts the MCP serves ----
  # Idempotent copy into the demo-owned /artifacts/securebank-demo/ dir.
  securebank-seed:
    image: alpine
    command:
      - sh
      - -c
      - mkdir -p /artifacts/securebank-demo &&
        ([ -f /artifacts/securebank-demo/query_templates.yaml ] ||
         cp /src/query_templates.yaml /src/policy.yaml /artifacts/securebank-demo/) &&
        echo "securebank curated artifacts ready in /artifacts/securebank-demo"
    volumes:
      - artifacts:/artifacts
      - ./securebank-demo/policy:/src:ro
    restart: "no"

  # ---- Prefront, exposed as ONE MCP server (the single endpoint the LLM uses)
  # Same engine image as semantic-mcp-server, but serving the demo's curated
  # artifacts against the SecureBank DB; identity resolved per-connection.
  securebank-mcp:
    build: ./semantic-mcp-server
    command: ["--templates=/artifacts/securebank-demo/query_templates.yaml", "serve", "--http", "--host=0.0.0.0", "--port=8090"]
    environment:
      IDENTITY_QUERY: SELECT user_id, name, email, role FROM users WHERE email = :who
      DATABASE_URL: postgresql://securebank:securebank@securebank-db:5432/securebank
      POLICY_PATH: /artifacts/securebank-demo/policy.yaml
    volumes:
      - artifacts:/artifacts:ro          # shared with the engine; read-only here
    ports: ["8100:8090"]                 # host 8100 (engine MCP owns 8090)
    depends_on:
      securebank-db: {condition: service_healthy}
      securebank-seed: {condition: service_completed_successfully}

  # ---- the "after" orchestrator: gpt-4o-mini as an MCP CLIENT of the server
  securebank-orchestrator:
    build: ./securebank-demo
    command: ["python", "demo_server.py"]
    environment:
      <<: *llm-env                       # OPENAI_API_KEY
      GOVERNED_MODEL: gpt-4o-mini
      UNGOVERNED_URL: http://securebank-ungoverned:8096/run
      GOVERNED_MCP_URL: http://securebank-mcp:8090/sse
    ports: ["8095:8095"]
    depends_on:
      securebank-ungoverned: {condition: service_started}
      securebank-mcp: {condition: service_started}

volumes:
  skillbuilder_db:
  api_db:
  semanticlayer_data:
  mcp_data:
  artifacts:
  securebank_pgdata:
