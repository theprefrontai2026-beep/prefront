# Serve the built SPA and reverse-proxy API calls to the backend services.
# Path prefixes mirror the new UI's vite dev proxy (vite.config.ts) so the same
# relative fetch() URLs work in production with no CORS or base-URL changes.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Schema/semantic endpoints -> semantic-layer API (more specific; first).
    location /design/semantic/ {
        proxy_pass http://semantic-layer-api:8010;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }
    # Everything else under /design -> skill-builder.
    location /design/ {
        proxy_pass http://skill-builder:8000;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;        # LLM extraction can take a while
    }

    # Collaborative-review websocket -> api-server (must precede /api/).
    location /api/ws/ {
        proxy_pass http://api-server:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
    # Audit log + health -> api-server.
    location /api/ {
        proxy_pass http://api-server:8080;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # Content-hashed build assets can cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Never cache the HTML entrypoint, so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
